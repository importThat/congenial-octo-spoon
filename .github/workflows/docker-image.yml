name: Build and Push Docker Image

on:
  push:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    permissions:
      packages: write
      contents: read

    steps:

    - uses: actions/checkout@v4

    - name: Login to GitHub Container Registry
      run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

    - name: Build image
      run: |
        docker build -t ghcr.io/importthat/congenial-octo-spoon/game-container:$(date +%Y%m%d%H%M%S) .

    - name: Push image
      run: |
        docker push ghcr.io/importthat/congenial-octo-spoon/game-container:$(date +%Y%m%d%H%M%S) .